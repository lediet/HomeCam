<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HomeCam 监控</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>HomeCam 监控</h1>
            <nav>
                <button class="tab-btn active" data-tab="live">实时</button>
                <button class="tab-btn" data-tab="history">历史</button>
            </nav>
        </header>

        <main>
            <section id="live-tab" class="tab-content active">
                <div class="video-container">
                    <img id="live-stream" src="/video" alt="实时画面">
                    <div id="stream-status" class="status-overlay">连接中...</div>
                </div>
                <div class="camera-selector">
                    <select id="camera-dropdown">
                        <option value="">加载摄像头中...</option>
                    </select>
                    <span id="camera-status" class="camera-status"></span>
                    <button id="power-toggle" class="power-btn" title="摄像头电源">⚠</button>
                    <button id="rotate-btn" class="power-btn" title="旋转画面 0°">↻</button>
                </div>
                <div class="event-log" id="event-log">
                    <div class="event-log-header">事件日志</div>
                    <div id="event-list">暂无事件</div>
                </div>
            </section>

            <section id="history-tab" class="tab-content">
                <div class="history-layout">
                    <div class="history-player-panel">
                        <div class="video-player">
                            <video id="playback" class="history-video" controls></video>
                        </div>
                        <div class="player-placeholder" id="player-placeholder">
                            <div class="placeholder-text">点击右侧视频播放</div>
                        </div>
                    </div>
                    <div class="history-list-panel">
                        <div id="video-list" class="video-list">
                            <div class="empty-state">暂无历史视频</div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/app.js"></script>
</body>
</html>
